<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>مرحباً بك في موقعنا</h2>
            <p>من فضلك أدخل اسمك لتخصيص تجربتك:</p>
            <form id="welcomeForm">
                <input type="text" id="clientName" placeholder="اكتب اسمك هنا..." required>
                <button type="submit">المتابعة لتسجيل الدخول</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('welcomeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('visitorName', document.getElementById('clientName').value);
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
