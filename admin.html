<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 550px; }
        .card { background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #008080; color: white; }
        button { width: 100%; padding: 12px; margin-top: 20px; border: none; border-radius: 5px; box-sizing: border-box; font-size: 15px; background-color: #a04040; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #803030; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>لوحة إدارة النظام (خاص بالمشرف)</h2>
        <p>تحديث فوري لكافة الطلبات والأسماء المسجلة:</p>
        
        <table>
            <thead>
                <tr>
                    <th>المستخدم</th>
                    <th>نوع الخدمة</th>
                    <th>العدد المطلوب</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
        
        <button onclick="clearSystemData()">تصفير كافة البيانات</button>
    </div>
</div>

<script>
    function loadAdminData() {
        const orders = JSON.parse(localStorage.getItem('systemOrders')) || [];
        const tableBody = document.getElementById('adminTableBody');
        tableBody.innerHTML = '';

        orders.forEach(item => {
            const row = `<tr>
                <td><b>${item.username}</b></td>
                <td>${item.service}</td>
                <td>${item.count}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    function clearSystemData() {
        localStorage.removeItem('systemOrders');
        loadAdminData();
    }

    // تشغيل جلب البيانات فوراً وتحديثها كل ثانيتين تلقائياً
    loadAdminData();
    setInterval(loadAdminData, 2000);
</script>

</body>
</html>
