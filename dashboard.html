<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز خدمات المتابعين</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .card { background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        button { background-color: #008080; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #005757; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 id="userWelcome">أهلاً بك مجدداً!</h2>
        <p>اختر الخدمة المطلوبة والعدد لإرسالها للمشرف:</p>
        
        <form id="orderForm">
            <select id="service" required>
                <option value="" disabled selected>اختر نوع الخدمة...</option>
                <option value="متابعين">طلب متابعين جدد</option>
                <option value="لايكات">طلب تفاعل ولايكات</option>
                <option value="مشاهدات">طلب زيادة مشاهدات</option>
            </select>
            
            <select id="count" required>
                <option value="" disabled selected>حدد العدد المطلوب...</option>
                <option value="1000">1000</option>
                <option value="3000">3000</option>
                <option value="5000">5000</option>
            </select>
            
            <button type="submit">تأكيد وإرسال الطلب</button>
        </form>
        
        <p id="status" style="color: green; font-weight: bold; margin-top: 15px;"></p>
    </div>
</div>

<script>
    // جلب الاسم الذي تم إدخاله في الصفحة الأولى
    const savedName = localStorage.getItem('visitorName') || 'شمسزش';
    document.getElementById('userWelcome').innerText = `أهلاً بك مجدداً، ${savedName}!`;

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const service = document.getElementById('service').value;
        const count = document.getElementById('count').value;

        // حفظ البيانات في ذاكرة المتصفح المشتركة
        let currentOrders = JSON.parse(localStorage.getItem('systemOrders')) || [];
        currentOrders.push({ username: savedName, service: service, count: count });
        localStorage.setItem('systemOrders', JSON.stringify(currentOrders));

        document.getElementById('status').innerText = 'تم تسجيل وإرسال طلبك بنجاح!';
        
        // تصفير الخيارات بعد الإرسال
        document.getElementById('service').value = '';
        document.getElementById('count').value = '';
    });
</script>

</body>
</html>
